[app]
log_file = app.log
log_level = INFO
startup_retry_delay = 300
contract_retry_delay = 600

[settings]
display_enabled = false
allow_simultaneous_trades = true
instrument_to_trade = NIFTY
data_provider = upstox
start_time = 09:15:00
strangle_start_time = 09:16:00
end_time = 15:25:00
record_data = true
backtest_enabled = true
backtest_date = 2026-03-06
trading_mode = live
active_broker = Zerodha_Client_Live_1
strikes_to_monitor = 1
strike_selection_hysteresis = 5.0

[database]
host = 127.0.0.1
port = 5432
user = postgres
password = postgres
database = trading_bot
required = false

[redis]
enabled = false
host = localhost
port = 6379
db = 0
price_feed_mode = direct

[brokers]
enabled_brokers = Zerodha, PaperTrade

[data_providers]
provider_list = upstox

[NIFTY]
