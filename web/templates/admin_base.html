<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin{% endblock %} — AlgoSoft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0f1e; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .stat-card { background: linear-gradient(135deg, #1e293b 0%, #162032 100%); border: 1px solid #334155; border-radius: 12px; }
    .nav-link { color: #94a3b8; transition: color 0.2s; padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: 500; }
    .nav-link:hover, .nav-link.active { color: #00d4aa; background: #0f172a; }
    .btn-primary { background: #00d4aa; color: #0a0f1e; font-weight: 700; border-radius: 8px; transition: all 0.2s; }
    .btn-primary:hover { background: #00a882; }
    .btn-danger { background: #dc2626; color: white; font-weight: 700; border-radius: 8px; }
    .btn-ghost { background: #334155; color: #e2e8f0; font-weight: 600; border-radius: 8px; }
    .btn-ghost:hover { background: #475569; }
    .input-field { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 8px 12px; width: 100%; }
    .input-field:focus { outline: none; border-color: #00d4aa; }
    .badge-ok { background: #064e3b; color: #34d399; border: 1px solid #059669; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .badge-warn { background: #451a03; color: #fb923c; border: 1px solid #c2410c; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .badge-err { background: #450a0a; color: #f87171; border: 1px solid #dc2626; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .badge-idle { background: #1e293b; color: #64748b; border: 1px solid #334155; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .toast-success { background: #064e3b; color: #34d399; border: 1px solid #059669; }
    .toast-error { background: #450a0a; color: #f87171; border: 1px solid #dc2626; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
    .tab-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 7px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { background: #00d4aa; color: #0a0f1e; border-color: #00d4aa; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; padding: 8px 12px; border-bottom: 1px solid #334155; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; }
    tr:hover td { background: #162032; }
  </style>
</head>
<body>
<nav style="background:#111827;border-bottom:1px solid #1e293b;" class="px-6 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#00d4aa"/><path d="M6 20 L10 14 L14 17 L18 10 L22 14" stroke="#0a0f1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="text-white font-bold text-lg">Algo<span style="color:#00d4aa">Soft</span></span>
    <span class="text-xs px-2 py-0.5 rounded ml-1" style="background:#1e293b;color:#fb923c;border:1px solid #431407;">ADMIN</span>
  </div>
  <div class="flex items-center gap-2">
    <a href="/admin" class="nav-link {% if active_page=='overview' %}active{% endif %}">Overview</a>
    <a href="/admin/clients" class="nav-link {% if active_page=='clients' %}active{% endif %}">Clients</a>
    <a href="/admin/data-provider" class="nav-link {% if active_page=='data_provider' %}active{% endif %}">Data Provider</a>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm" style="color:#64748b">admin</span>
    <a href="/logout" class="btn-ghost px-3 py-1.5 text-xs">Sign out</a>
  </div>
</nav>

<div class="px-6 py-6 max-w-screen-xl mx-auto">
  {% block content %}{% endblock %}
</div>

<div id="toast" class="toast"></div>
<script>
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}
function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
